{% extends "base.html"%}

{% block title %}
<title>Dictionary-Home</title>
{% endblock  %} 

{% block home_active %}
class="active"
{% endblock %} 



{% block content %}
<div class="row">
    <div class="col-md-6">
        <h1> The Dictionary App</h1>
        <div class="row">
            <div class="col-sm-6">
                <form action="">
                    <div class="form-group">
                        <label for="word">Word:</label>
                        <input type="text" class="form-control" 
                        id="word" placeholder="Type in the word here:">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block 
                    btn-lg">Submit</button>
                </form>                
            </div>
            <div class="col-sm-6">  
                <form action="">
                    <div class="form-group">
                        <label for="word">Meaning:</label>
                        <textarea class="form-control" id="word" rows="4" placeholder="The meaning of the word shows here" disabled>
                        </textarea>
                    </div>
                </form>             
            </div>
        </div>
    </div>
    <div class="col-sm-6">
        <img src="{{ url_for('static', filename='images/search.png') }}"
        class="img-responsive" alt="search">
    </div>
</div>
{% endblock %}
